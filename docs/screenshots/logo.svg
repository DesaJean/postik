<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Postik logo">
  <title>Postik</title>
  <desc>A yellow sticky note with a partial orange timer ring around it, representing notes plus timers.</desc>

  <!-- Timer ring background (full circle, light gray) -->
  <circle cx="100" cy="100" r="78" fill="none" stroke="#D3D1C7" stroke-width="6"/>

  <!-- Timer ring progress (orange arc, ~62% completion to imply running timer) -->
  <path d="M 100 22 A 78 78 0 0 1 175 130"
        fill="none"
        stroke="#D85A30"
        stroke-width="6"
        stroke-linecap="round"/>

  <!-- The sticky note in center -->
  <rect x="58" y="58" width="84" height="84" rx="8"
        fill="#FAC775"
        stroke="#854F0B"
        stroke-width="1"/>

  <!-- The "P" letter -->
  <text x="100" y="118" text-anchor="middle"
        fill="#412402"
        style="font-size: 52px; font-weight: 600; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;">P</text>
</svg>
