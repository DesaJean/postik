name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and publish (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        include:
          # `universal-apple-darwin` isn't a real rustup target — it's a
          # tauri-action meta-target that lipos two real targets together.
          # We have to install BOTH real targets here.
          - os: macos-latest
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: '--target universal-apple-darwin'
          - os: windows-latest
            rust-targets: x86_64-pc-windows-msvc
            args: ''
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '22'
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri -> target
      - name: Install dependencies
        run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: 'Postik ${{ github.ref_name }}'
          releaseBody: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/main/CHANGELOG.md) for release notes.

            **Downloads**
            - macOS: `.dmg` (universal — Apple Silicon + Intel)
            - Windows: `.msi`
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
